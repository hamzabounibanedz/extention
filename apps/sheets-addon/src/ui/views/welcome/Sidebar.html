<!doctype html>
<html lang="<?= lang ?>" dir="<?= lang === 'ar' ? 'rtl' : 'ltr' ?>">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* 60-30-10: ~60% neutral base, ~30% surfaces/borders/secondary text, ~10% accent */
      :root {
        --dt-base: #f1f3f4;
        --dt-surface: #ffffff;
        --dt-surface-secondary: #e8eaed;
        --dt-border: #dadce0;
        --dt-text: #202124;
        --dt-text-secondary: #5f6368;
        --dt-accent: #1a73e8;
        --dt-accent-hover: #1558b0;
        --dt-accent-muted: rgba(26, 115, 232, 0.12);
        --dt-success: #137333;
        --dt-danger: #c5221f;
        /* warning tier for near‑risk / trial / expiring */
        --dt-warning: #ea8600;
        --dt-warning-muted: rgba(234, 134, 0, 0.12);
        --dt-radius: 8px;
        --dt-radius-sm: 6px;
        --dt-radius-lg: 12px;
        --dt-space: 12px;
        --dt-shadow-sm: 0 1px 2px rgba(60, 64, 67, 0.08);
        --dt-shadow-md: 0 6px 16px rgba(60, 64, 67, 0.14);
        --dt-font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: var(--dt-font);
        padding: var(--dt-space);
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(26, 115, 232, 0.08), transparent 42%),
          var(--dt-base);
        color: var(--dt-text);
        font-size: 13px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }
      h1.dt-title {
        margin: 0 0 12px;
        padding: 10px 12px;
        font-size: 1.06rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--dt-text);
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-lg);
        background: linear-gradient(180deg, #fff, #f8fbff);
        box-shadow: var(--dt-shadow-sm);
      }
      .dt-card {
        background: var(--dt-surface);
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-lg);
        padding: 13px;
        margin-bottom: 13px;
        box-shadow: var(--dt-shadow-sm);
        transition:
          box-shadow 0.14s ease,
          border-color 0.14s ease;
      }
      .dt-card:hover {
        box-shadow: var(--dt-shadow-md);
      }
      #dt-license {
        border-top: 3px solid #1a73e8;
      }
      #dt-setup {
        border-top: 3px solid #5e35b1;
      }
      #dt-orders {
        border-top: 3px solid #137333;
      }
      #dt-stats {
        border-top: 3px solid #ea8600;
      }
      #dt-journal {
        border-top: 3px solid #5f6368;
      }
      .dt-card[data-core-step] {
        position: relative;
        overflow: hidden;
      }
      .dt-card[data-core-step]::before {
        content: "";
        position: absolute;
        inset-block: 0;
        inset-inline-start: 0;
        width: 3px;
        background: transparent;
      }
      .dt-card.dt-flow-pending[data-core-step]::before {
        background: var(--dt-warning);
      }
      .dt-card.dt-flow-done[data-core-step]::before {
        background: var(--dt-success);
      }
      .dt-card h2 {
        margin: 0 0 11px;
        font-size: 0.98rem;
        font-weight: 600;
        color: var(--dt-text);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .dt-step-title {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .dt-step-badge {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid var(--dt-border);
        background: var(--dt-base);
        color: var(--dt-text-secondary);
        font-size: 11px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .dt-step-badge.dt-step-done {
        background: rgba(19, 115, 51, 0.08);
        border-color: rgba(19, 115, 51, 0.35);
        color: var(--dt-success);
      }
      .dt-section-toggle {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--dt-text-secondary);
        font-size: 11px;
        font-weight: 500;
        padding: 0;
        cursor: pointer;
      }
      .dt-section-toggle:hover {
        color: var(--dt-text);
      }
      .dt-collapsed .dt-section-content {
        display: none;
      }
      .dt-card.dt-busy {
        border-color: var(--dt-accent);
        box-shadow: 0 0 0 1px var(--dt-accent-muted) inset;
      }
      label {
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
        color: var(--dt-text-secondary);
        font-size: 11.5px;
        font-weight: 600;
      }
      label:first-of-type {
        margin-top: 0;
      }
      .dt-check {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-top: 10px;
        cursor: pointer;
        font-size: 13px;
        color: var(--dt-text);
      }
      .dt-check input {
        margin: 2px 0 0;
        flex-shrink: 0;
      }
      select,
      .dt-ltr {
        width: 100%;
        max-width: 100%;
      }
      select {
        padding: 8px 10px;
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        background: linear-gradient(180deg, #fff, #fcfdff);
        font-size: 13px;
        color: var(--dt-text);
        transition:
          border-color 0.12s ease,
          box-shadow 0.12s ease,
          background 0.12s ease;
      }
      select:hover,
      input[type="text"]:hover,
      input[type="url"]:hover,
      input[type="password"]:hover,
      input[type="date"]:hover,
      textarea:hover {
        border-color: #b7bcc2;
      }
      select:focus,
      input:focus,
      textarea:focus,
      button:focus-visible {
        outline: 2px solid var(--dt-accent);
        outline-offset: 1px;
      }
      .dt-row {
        margin-bottom: 8px;
      }
      .dt-map-group {
        border-top: 1px solid var(--dt-border);
        padding-top: 8px;
        margin-top: 8px;
      }
      .dt-map-group-header {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 6px;
      }
      .dt-map-group-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--dt-text);
      }
      .dt-map-group-hint {
        font-size: 11px;
        color: var(--dt-text-secondary);
      }
      .dt-map-group-body {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .dt-map-group-collapsed .dt-map-group-body {
        display: none;
      }
      .dt-map-field label {
        margin-top: 0;
      }
      .dt-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: var(--dt-space);
      }
      .dt-actions > button,
      .dt-actions > a {
        flex: 1 1 120px;
      }
      .dt-actions > a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      button {
        min-height: 34px;
        padding: 8px 14px;
        border-radius: var(--dt-radius-sm);
        border: 1px solid var(--dt-border);
        background: var(--dt-surface);
        color: var(--dt-text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.12s ease,
          border-color 0.12s ease;
      }
      button:hover:not(:disabled) {
        background: var(--dt-surface-secondary);
        transform: translateY(-1px);
      }
      button.dt-primary {
        background: var(--dt-accent);
        color: #fff;
        border-color: var(--dt-accent);
      }
      button.dt-primary:hover:not(:disabled) {
        background: var(--dt-accent-hover);
        border-color: var(--dt-accent-hover);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #dt-status {
        margin: 10px 0 0;
        min-height: 1.2em;
        font-size: 12px;
        color: var(--dt-text-secondary);
      }
      #dt-status.dt-err {
        color: var(--dt-danger);
      }
      #dt-status.dt-ok {
        color: var(--dt-success);
      }
      .dt-hint {
        margin: 0 0 10px;
        padding: 7px 9px;
        font-size: 12px;
        color: var(--dt-text-secondary);
        line-height: 1.4;
        border: 1px dashed rgba(26, 115, 232, 0.2);
        border-radius: var(--dt-radius-sm);
        background: rgba(26, 115, 232, 0.05);
      }
      .dt-output {
        margin: 10px 0 0;
        padding: 10px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        min-height: 38px;
      }
      .dt-output:empty::before {
        content: "—";
        color: var(--dt-text-secondary);
      }
      .dt-output-kv-grid {
        display: grid;
        gap: 6px;
      }
      .dt-output-kv {
        display: grid;
        grid-template-columns: minmax(110px, 0.8fr) minmax(0, 1.2fr);
        gap: 8px;
        align-items: center;
        border: 1px solid var(--dt-border);
        background: var(--dt-surface);
        border-radius: var(--dt-radius-sm);
        padding: 6px 8px;
      }
      .dt-output-k {
        font-size: 11px;
        font-weight: 600;
        color: var(--dt-text-secondary);
      }
      .dt-output-v {
        font-size: 12px;
        color: var(--dt-text);
        word-break: break-word;
      }
      .dt-output-lines {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }
      .dt-output-lines:first-child {
        margin-top: 0;
      }
      .dt-output-line {
        font-size: 12px;
        color: var(--dt-text);
        line-height: 1.4;
        border-inline-start: 3px solid var(--dt-border);
        background: var(--dt-surface);
        border-radius: var(--dt-radius-sm);
        padding: 6px 8px;
      }
      .dt-output-line--ok {
        border-inline-start-color: var(--dt-success);
      }
      .dt-output-line--warn {
        border-inline-start-color: var(--dt-warning);
      }
      .dt-output-line--err {
        border-inline-start-color: var(--dt-danger);
      }
      .dt-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 22px;
        padding: 1px 8px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.2;
      }
      .dt-pill--active,
      .dt-pill--ok {
        background: rgba(19, 115, 51, 0.08);
        border-color: rgba(19, 115, 51, 0.35);
        color: var(--dt-success);
      }
      .dt-pill--trial,
      .dt-pill--warn {
        background: var(--dt-warning-muted);
        border-color: rgba(234, 134, 0, 0.45);
        color: var(--dt-warning);
      }
      .dt-pill--expired,
      .dt-pill--revoked,
      .dt-pill--err {
        background: rgba(197, 34, 31, 0.06);
        border-color: rgba(197, 34, 31, 0.35);
        color: var(--dt-danger);
      }
      .dt-pill--unknown {
        background: rgba(0, 0, 0, 0.03);
        border-color: rgba(0, 0, 0, 0.1);
        color: var(--dt-text-secondary);
      }
      .dt-pre {
        margin: 8px 0 0;
        padding: 10px;
        max-height: 240px;
        overflow: auto;
        background: var(--dt-surface);
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        font-size: 11px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--dt-text);
      }
      .dt-pre:empty::before {
        content: "—";
        color: var(--dt-text-secondary);
      }
      details.dt-json-details {
        margin-top: 8px;
      }
      details.dt-json-details > summary {
        cursor: pointer;
        color: var(--dt-text-secondary);
        font-size: 12px;
      }
      details.dt-json-details > .dt-pre {
        margin-top: 8px;
      }
      .dt-substatus {
        margin: 8px 0 0;
        font-size: 12px;
        color: var(--dt-text-secondary);
        min-height: 1.2em;
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        background: rgba(255, 255, 255, 0.84);
        padding: 6px 8px;
      }
      .dt-substatus:empty {
        display: none;
      }
      .dt-substatus.dt-err {
        color: var(--dt-danger);
        border-color: rgba(197, 34, 31, 0.35);
        background: rgba(197, 34, 31, 0.05);
      }
      .dt-substatus.dt-ok {
        color: var(--dt-success);
        border-color: rgba(19, 115, 51, 0.35);
        background: rgba(19, 115, 51, 0.08);
      }
      #dt-status,
      .dt-substatus,
      .dt-output,
      .dt-pre,
      .dt-license-summary {
        unicode-bidi: plaintext;
      }
      .dt-warning {
        color: var(--dt-warning);
      }
      input[type="text"],
      input[type="url"],
      input[type="password"],
      input[type="date"] {
        width: 100%;
        max-width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        font-size: 13px;
        color: var(--dt-text);
        background: var(--dt-surface);
      }
      html[dir="rtl"] input.dt-ltr,
      html[dir="rtl"] textarea.dt-ltr {
        direction: ltr;
        text-align: left;
      }
      textarea {
        width: 100%;
        max-width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        font-size: 12px;
        font-family: ui-monospace, monospace;
        resize: vertical;
        min-height: 88px;
        color: var(--dt-text);
        background: var(--dt-surface);
      }
      .dt-license-summary {
        margin-top: 10px;
        padding: 10px;
        background: var(--dt-base);
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
      }
      .dt-license-summary-title {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 600;
        color: var(--dt-text);
      }
      .dt-license-summary-empty {
        margin: 0;
        font-size: 12px;
        color: var(--dt-text-secondary);
      }
      .dt-license-grid {
        display: grid;
        gap: 6px;
      }
      .dt-license-item {
        display: grid;
        grid-template-columns: minmax(110px, 0.85fr) minmax(0, 1.15fr);
        gap: 8px;
        align-items: center;
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        background: var(--dt-surface);
        padding: 6px 8px;
      }
      .dt-license-item .dt-k {
        font-size: 11px;
        font-weight: 600;
        color: var(--dt-text-secondary);
      }
      .dt-license-item .dt-v {
        font-size: 12px;
        color: var(--dt-text);
        word-break: break-word;
      }
      .dt-license-banner {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        margin-bottom: 10px;
        border-radius: var(--dt-radius-sm);
        border: 1px solid var(--dt-border);
        background: var(--dt-base);
      }
      .dt-license-badge {
        margin-top: 2px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .dt-license-badge--trial {
        background: var(--dt-warning-muted);
        border-color: rgba(234, 134, 0, 0.4);
        color: var(--dt-warning);
      }
      .dt-license-badge--active {
        background: rgba(19, 115, 51, 0.08);
        border-color: rgba(19, 115, 51, 0.35);
        color: var(--dt-success);
      }
      .dt-license-badge--expired {
        background: rgba(197, 34, 31, 0.06);
        border-color: rgba(197, 34, 31, 0.35);
        color: var(--dt-danger);
      }
      .dt-license-badge--unknown {
        background: rgba(0, 0, 0, 0.02);
        border-color: rgba(0, 0, 0, 0.1);
        color: var(--dt-text-secondary);
      }
      .dt-license-banner-main {
        flex: 1;
        min-width: 0;
      }
      .dt-license-title {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 2px;
        color: var(--dt-text);
      }
      .dt-license-body {
        font-size: 12px;
        color: var(--dt-text-secondary);
        margin: 0 0 6px;
      }
      .dt-license-ctas {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .dt-license-ctas button,
      .dt-license-ctas a {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
      }
      .dt-license-ctas a {
        text-decoration: none;
        border: 1px solid transparent;
        color: var(--dt-accent);
        background: var(--dt-accent-muted);
      }
      .dt-license-ctas a:hover {
        border-color: var(--dt-accent);
      }
      .dt-modal[hidden] {
        display: none !important;
      }
      .dt-modal {
        position: fixed;
        inset: 0;
        z-index: 1200;
      }
      .dt-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(32, 33, 36, 0.55);
      }
      .dt-modal-dialog {
        position: relative;
        margin: 16px;
        max-height: calc(100vh - 32px);
        overflow: auto;
        background: var(--dt-surface);
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius);
        box-shadow: 0 8px 20px rgba(60, 64, 67, 0.3);
      }
      .dt-modal-header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--dt-border);
        background: var(--dt-surface);
      }
      .dt-modal-title {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: var(--dt-text);
      }
      .dt-modal-close {
        min-width: 30px;
        min-height: 30px;
        padding: 0;
        border-radius: 999px;
        font-size: 18px;
        line-height: 1;
      }
      .dt-modal-body {
        padding: 12px;
      }
      .dt-stats-headline {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .dt-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--dt-border);
        background: var(--dt-base);
        font-size: 11px;
        color: var(--dt-text-secondary);
      }
      .dt-stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }
      .dt-stats-card {
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        background: var(--dt-base);
        padding: 8px;
      }
      .dt-stats-card-k {
        font-size: 11px;
        color: var(--dt-text-secondary);
      }
      .dt-stats-card-v {
        margin-top: 2px;
        font-size: 18px;
        font-weight: 700;
        color: var(--dt-text);
      }
      .dt-stats-chart-wrap {
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        background: var(--dt-base);
        padding: 10px;
        margin-bottom: 10px;
      }
      .dt-stats-chart-layout {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items: center;
      }
      .dt-stats-donut {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        position: relative;
      }
      .dt-stats-donut::after {
        content: "";
        position: absolute;
        inset: 18px;
        background: var(--dt-surface);
        border-radius: 50%;
      }
      .dt-stats-donut-center {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--dt-text);
        z-index: 1;
      }
      .dt-stats-legend {
        display: grid;
        gap: 6px;
      }
      .dt-stats-legend-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      .dt-stats-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dt-stats-bars {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }
      .dt-stats-bar-row {
        display: grid;
        grid-template-columns: minmax(84px, 0.9fr) 1fr auto;
        align-items: center;
        gap: 8px;
      }
      .dt-stats-bar-track {
        position: relative;
        height: 8px;
        border-radius: 999px;
        background: rgba(95, 99, 104, 0.18);
        overflow: hidden;
      }
      .dt-stats-bar-fill {
        position: absolute;
        inset-inline-start: 0;
        top: 0;
        bottom: 0;
        border-radius: 999px;
      }
      .dt-stats-table-wrap {
        border: 1px solid var(--dt-border);
        border-radius: var(--dt-radius-sm);
        background: var(--dt-base);
        overflow: auto;
        margin-top: 10px;
      }
      .dt-stats-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
