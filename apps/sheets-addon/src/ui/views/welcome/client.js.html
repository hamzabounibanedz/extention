<script>
  (function () {
    "use strict";

    var I18N = {};
    function t(key) {
      return I18N[key] != null ? String(I18N[key]) : key;
    }
    function tf(key) {
      var args = Array.prototype.slice.call(arguments, 1);
      var s = t(key);
      return s.replace(/\{(\d+)\}/g, function (_, i) {
        return args[i] !== undefined && args[i] !== null ? String(args[i]) : "";
      });
    }
    function applyDomI18n() {
      document.querySelectorAll("[data-i18n]").forEach(function (node) {
        node.textContent = t(node.getAttribute("data-i18n"));
      });
      document
        .querySelectorAll("[data-i18n-placeholder]")
        .forEach(function (node) {
          node.setAttribute(
            "placeholder",
            t(node.getAttribute("data-i18n-placeholder")),
          );
        });
    }

    var FIELD_DEFS = [
      // Required for sending orders
      {
        key: "orderIdColumn",
        mapKey: "sidebar.map.orderId",
        group: "required",
      },
      { key: "phoneColumn", mapKey: "sidebar.map.phone", group: "required" },
      {
        key: "addressColumn",
        mapKey: "sidebar.map.address",
        group: "required",
      },
      { key: "wilayaColumn", mapKey: "sidebar.map.wilaya", group: "required" },
      { key: "codColumn", mapKey: "sidebar.map.cod", group: "required" },
      // Recipient name: at least one mapped column (matches carrier validation, e.g. ZR).
      {
        key: "customerFirstNameColumn",
        mapKey: "sidebar.map.firstName",
        group: "required",
      },
      {
        key: "customerLastNameColumn",
        mapKey: "sidebar.map.lastName",
        group: "required",
      },
      {
        key: "customerFullNameColumn",
        mapKey: "sidebar.map.fullName",
        group: "required",
      },
      // Recommended for smoother delivery
      {
        key: "wilayaCodeColumn",
        mapKey: "sidebar.map.wilayaCode",
        group: "recommended",
      },
      {
        key: "communeColumn",
        mapKey: "sidebar.map.commune",
        group: "recommended",
      },
      {
        key: "productColumn",
        mapKey: "sidebar.map.product",
        group: "recommended",
      },
      {
        key: "quantityColumn",
        mapKey: "sidebar.map.qty",
        group: "recommended",
      },
      // Optional / advanced tracking & operations
      {
        key: "shippingFeeColumn",
        mapKey: "sidebar.map.shippingFee",
        group: "optional",
      },
      {
        key: "deliveryTypeColumn",
        mapKey: "sidebar.map.deliveryType",
        group: "recommended",
      },
      {
        key: "stopDeskIdColumn",
        mapKey: "sidebar.map.stopDeskId",
        group: "recommended",
      },
      // Status and tracking are essential for write-back and sync, but not strictly required
      // to start a minimal send flow, so we treat them as "recommended" instead of "optional".
      {
        key: "statusColumn",
        mapKey: "sidebar.map.status",
        group: "recommended",
      },
      {
        key: "carrierColumn",
        mapKey: "sidebar.map.carrierCol",
        group: "optional",
      },
      {
        key: "trackingColumn",
        mapKey: "sidebar.map.tracking",
        group: "recommended",
      },
      {
        key: "externalShipmentIdColumn",
        mapKey: "sidebar.map.externalId",
        group: "optional",
      },
      {
        key: "labelUrlColumn",
        mapKey: "sidebar.map.labelUrl",
        group: "optional",
      },
      { key: "notesColumn", mapKey: "sidebar.map.notes", group: "optional" },
      {
        key: "blacklistColumn",
        mapKey: "sidebar.map.blacklist",
        group: "optional",
      },
      {
        key: "blacklistReasonColumn",
        mapKey: "sidebar.map.blacklistReason",
        group: "optional",
      },
      {
        key: "orderDateColumn",
        mapKey: "sidebar.map.orderDate",
        group: "optional",
      },
    ];

    var BOOTSTRAP =
      typeof window.__DT_BOOTSTRAP__ === "object" &&
      window.__DT_BOOTSTRAP__ &&
      !Array.isArray(window.__DT_BOOTSTRAP__)
        ? window.__DT_BOOTSTRAP__
        : {};

    var state = {
      spreadsheetId: null,
      sheets: [],
      carriers: [],
      carrierCredByCarrier: {},
      currentSheetId: null,
      /** Last worksheet chosen in sidebar (from document prefs), not the active tab. */
      preferredSidebarSheetId: null,
      headerPayload: null,
      mapping: null,
      feeRules: null,
      lastLabelUrls: [],
      autoSyncEnabled: false,
      licenseStatus: "unknown",
      apiBaseUrl: "",
      apiConfigured: false,
      /** When false, onboarding step for license is not styled (avoids “signed out” flash while loading). */
      licenseUiHydrated: false,
      mappingReady: false,
      opsReady: false,
      carriersWarning: "",
      uiMode: BOOTSTRAP.uiMode === "prod" ? "prod" : "local",
      allowBackendConfig: BOOTSTRAP.allowBackendConfig !== false,
      showTechnicalDetails: BOOTSTRAP.showTechnicalDetails !== false,
      lastStatsResult: null,
      /** Prevents overlapping send/sync/preview server calls (double-clicks vs. slow responses). */
      ordersPipelineBusy: false,
    };

    var el = {
      sheet: null,
      fields: null,
      carrier: null,
      save: null,
      reload: null,
      headerRow: null,
      status: null,
      ordersPreview: null,
      ordersSend: null,
      ordersSync: null,
      ordersOut: null,
      ordersStatus: null,
      ordersPrintLabels: null,
      ordersPrintAll: null,
      rowSelection: null,
      sendCarrierMode: null,
      sendCarrierOverrideWrap: null,
      sendCarrierOverride: null,
      backendConfig: null,
      licenseAdvanced: null,
      licenseCodePanel: null,
      apiUrl: null,
      apiUrlSave: null,
      apiKey: null,
      apiKeySave: null,
      syncMeta: null,
      licenseCode: null,
      licenseRefresh: null,
      licenseRefreshPublic: null,
      licenseClear: null,
      licenseSummary: null,
      licenseStatus: null,
      licenseStatusInline: null,
      licenseBanner: null,
      licenseBadge: null,
      licenseTitle: null,
      licenseBody: null,
      licenseActivateCta: null,
      licenseContactCta: null,
      feeCarrier: null,
      feeDefault: null,
      feeWilaya: null,
      feeSave: null,
      feeApply: null,
      feeOverwrite: null,
      feeStatus: null,
      statsCompute: null,
      statsOut: null,
      statsStatus: null,
      wilayaValidate: null,
      wilayaAllowInvalid: null,
      communeWilaya: null,
      communeValidate: null,
      blacklistHighlight: null,
      listsStatus: null,
      statsFrom: null,
      statsTo: null,
      statsOpenDashboard: null,
      statsModal: null,
      statsModalBackdrop: null,
      statsModalClose: null,
      statsModalBody: null,
      journalOut: null,
      journalStatus: null,
      journalRefresh: null,
      journalClear: null,
      journalRetrySend: null,
      journalRetrySync: null,
      carrierCredCarrier: null,
      carrierCredSingleWrap: null,
      carrierCredZrWrap: null,
      carrierCredNoestWrap: null,
      carrierCredKey: null,
      carrierCredTenant: null,
      carrierCredSecret: null,
      carrierCredSave: null,
      carrierCredTest: null,
      carrierCredStatus: null,
      bizName: null,
      bizPhone: null,
      bizAddress: null,
      bizWilaya: null,
      bizWilayaCode: null,
      bizCommune: null,
      bizDefaultCarrier: null,
      bizStopDeskId: null,
      bizSave: null,
      bizReload: null,
      bizStatus: null,
      autoSyncStatus: null,
      autoSyncToggle: null,
      langSelect: null,
      langApply: null,
    };

    function $(id) {
      return document.getElementById(id);
    }

    function safeInsertBefore_(parent, node, referenceNode) {
      if (!parent || !node) return false;
      var ref = referenceNode || null;
      if (ref && ref.parentNode !== parent) {
        ref = null;
      }
      try {
        parent.insertBefore(node, ref);
        return true;
      } catch (e) {
        try {
          parent.appendChild(node);
          return true;
        } catch (_) {
          return false;
        }
      }
    }

    /** UX order: account → carrier keys → business defaults → column mapping → daily ops → advanced tools. */
    var FLOW_SECTION_ORDER_ = [
      "dt-license",
      "dt-carrier-creds",
      "dt-business",
      "dt-setup",
      "dt-orders",
      "dt-journal",
      "dt-stats",
    ];

    /** Only these three sections show numbered onboarding badges (1–3). */
    var CORE_FLOW_STEP_BY_SECTION_ = {
      "dt-license": 1,
      "dt-setup": 2,
      "dt-orders": 3,
    };

    var SECTION_DEFAULT_OPEN_ = {
      "dt-license": true,
      "dt-setup": true,
      "dt-orders": true,
      "dt-business": false,
      "dt-carrier-creds": false,
      "dt-journal": false,
      "dt-stats": false,
    };

    function initSectionFlowUi() {
      var anchor = $("dt-sections-anchor");
      FLOW_SECTION_ORDER_.forEach(function (id) {
        var section = $(id);
        if (!section || !anchor || !anchor.parentNode) return;
        // Keep DOM ordering best-effort only: never let it block sidebar boot.
        safeInsertBefore_(anchor.parentNode, section, anchor);
      });

      FLOW_SECTION_ORDER_.forEach(function (id) {
        var card = $(id);
        if (!card || card.querySelector(".dt-section-content")) {
          return;
        }
        var heading = card.querySelector("h2");
        if (!heading) {
          return;
        }

        var titleText = heading.textContent || "";
        var flowStep = CORE_FLOW_STEP_BY_SECTION_[id];
        while (heading.firstChild) heading.removeChild(heading.firstChild);
        var title = document.createElement("span");
        title.className = "dt-step-title";
        if (flowStep >= 1 && flowStep <= 3) {
          card.setAttribute("data-core-step", String(flowStep));
          var stepBadge = document.createElement("span");
          var stepBadgeId = id + "-step-badge";
          stepBadge.id = stepBadgeId;
          stepBadge.className = "dt-step-badge";
          stepBadge.setAttribute("data-step-number", String(flowStep));
          stepBadge.textContent = String(flowStep);
          card.setAttribute("data-step-badge-id", stepBadgeId);
          title.appendChild(stepBadge);
        }
        var titleLabel = document.createElement("span");
        titleLabel.textContent = titleText;
        title.appendChild(titleLabel);
        var toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "dt-section-toggle";
        heading.appendChild(title);
        heading.appendChild(toggle);

        var content = document.createElement("div");
        content.className = "dt-section-content";
        while (heading.nextSibling) {
          content.appendChild(heading.nextSibling);
        }
        card.appendChild(content);

        var open = !!SECTION_DEFAULT_OPEN_[id];
        var renderToggle = function () {
          card.classList.toggle("dt-collapsed", !open);
          toggle.textContent = open
            ? t("sidebar.section.collapse")
            : t("sidebar.section.expand");
          toggle.setAttribute("aria-expanded", String(open));
        };
        toggle.addEventListener("click", function () {
          open = !open;
          renderToggle();
        });
        renderToggle();
      });

      refreshFlowReadiness_();
    }

    function setSectionBusy(sectionId, busy) {
      var section = $(sectionId);
      if (!section) return;
      section.classList.toggle("dt-busy", !!busy);
      section.setAttribute("aria-busy", busy ? "true" : "false");
    }

    function columnMapped_(columns, key) {
      if (!columns || typeof columns !== "object") return false;
      var v = columns[key];
      var n = Number(v);
      return v != null && String(v).trim() !== "" && isFinite(n) && n >= 1;
    }

    /** Matches OrderEngine.validateOrder_: need full name, or first+last, or either part. */
    function mappingHasCustomerNameColumns_(columns) {
      if (!columns) return false;
      return (
        columnMapped_(columns, "customerFullNameColumn") ||
        columnMapped_(columns, "customerFirstNameColumn") ||
        columnMapped_(columns, "customerLastNameColumn")
      );
    }

    function mappingHasRequiredColumns_(mapping) {
      if (!mapping || !mapping.columns || typeof mapping.columns !== "object") {
        return false;
      }
      function effectiveCarrierId_() {
        var fromUi = el && el.carrier ? String(el.carrier.value || "").trim() : "";
        if (fromUi) return fromUi.toLowerCase();
        var fromMap =
          mapping.defaultCarrier != null
            ? String(mapping.defaultCarrier || "").trim()
            : "";
        return fromMap ? fromMap.toLowerCase() : "";
      }
      var carrierId = effectiveCarrierId_();
      var required = [
        "orderIdColumn",
        "phoneColumn",
        "addressColumn",
        "wilayaColumn",
        "codColumn",
      ];
      // Carrier-aware required field:
      // Yalidine needs commune/city for all parcels; ZR home also depends on commune.
      if (
        carrierId === "yalidine" ||
        carrierId === "zr" ||
        carrierId === "noest"
      ) {
        required.push("communeColumn");
      }
      for (var i = 0; i < required.length; i++) {
        var key = required[i];
        var v = mapping.columns[key];
        var n = Number(v);
        if (!isFinite(n) || n < 1) {
          return false;
        }
      }
      if (!mappingHasCustomerNameColumns_(mapping.columns)) {
        return false;
      }
      // Prevent known mis-mapping: address/wilaya/commune cannot all share one column.
      var addr = Number(mapping.columns.addressColumn);
      var wil = Number(mapping.columns.wilayaColumn);
      var com = Number(mapping.columns.communeColumn);
      if (
        isFinite(addr) &&
        addr >= 1 &&
        isFinite(wil) &&
        wil >= 1 &&
        isFinite(com) &&
        com >= 1 &&
        addr === wil &&
        wil === com
      ) {
        return carrierId === "yalidine";
      }
      return true;
    }

    function setCoreStepState_(sectionId, done) {
      var card = $(sectionId);
      if (!card) return;
      if (!card.hasAttribute("data-core-step")) return;
      card.classList.toggle("dt-flow-done", !!done);
      card.classList.toggle("dt-flow-pending", !done);
      var badgeId = card.getAttribute("data-step-badge-id");
      var badge = badgeId ? $(badgeId) : null;
      if (!badge) return;
      badge.classList.toggle("dt-step-done", !!done);
      badge.textContent = done
        ? "✓"
        : badge.getAttribute("data-step-number") || "";
    }

    function refreshFlowReadiness_() {
      if (state.licenseUiHydrated) {
        var licenseReady =
          state.apiConfigured &&
          (state.licenseStatus === "active" || state.licenseStatus === "trial");
        setCoreStepState_("dt-license", licenseReady);
      }
      setCoreStepState_("dt-setup", !!state.mappingReady);
      setCoreStepState_("dt-orders", !!state.opsReady);
    }

    function detailsNodeIdForPre_(outputEl) {
      return outputEl && outputEl.id ? outputEl.id + "-details" : "";
    }

    function clearStructuredOutput(outputEl) {
      if (!outputEl) return;
      outputEl.textContent = "";
      var detailsId = detailsNodeIdForPre_(outputEl);
      var detailsNode = detailsId ? $(detailsId) : null;
      if (detailsNode && detailsNode.parentNode) {
        detailsNode.parentNode.removeChild(detailsNode);
      }
    }

    function setHidden_(node, hidden) {
      if (!node) return;
      node.hidden = !!hidden;
    }

    function applyUiMode_() {
      setHidden_(el.backendConfig, !state.allowBackendConfig);
      setHidden_(el.licenseAdvanced, !state.showTechnicalDetails);
      setHidden_(el.licenseCodePanel, state.uiMode === "prod");

      if (state.showTechnicalDetails) {
        return;
      }

      [el.ordersOut, el.statsOut, el.journalOut].forEach(function (outputEl) {
        var detailsId = detailsNodeIdForPre_(outputEl);
        var detailsNode = detailsId ? $(detailsId) : null;
        if (detailsNode && detailsNode.parentNode) {
          detailsNode.parentNode.removeChild(detailsNode);
        }
      });
    }

    function normalizeSummaryLines_(summaryLines) {
      var lines = Array.isArray(summaryLines) ? summaryLines : [summaryLines];
      return lines
        .filter(function (line) {
          return line != null && String(line).trim() !== "";
        })
        .map(function (line) {
          return String(line).trim();
        });
    }

    function tryParseSummaryPair_(line) {
      if (!line) return null;
      if (/^\s*https?:\/\//i.test(line)) return null;
      var m = String(line).match(/^\s*([^:\n]{1,80})\s*[:：]\s*(.+)\s*$/);
      if (!m) return null;
      var key = m[1] ? String(m[1]).trim() : "";
      var value = m[2] ? String(m[2]).trim() : "";
      if (!key || !value) return null;
      if (key.indexOf("://") !== -1) return null;
      return { key: key, value: value };
    }

    function formatMaybeDateForUi_(value) {
      if (value == null) return "";
      var raw = String(value).trim();
      if (!raw) return "";
      var maybeIso = /^\d{4}-\d{2}-\d{2}(?:[T\s]\d{2}:\d{2})/.test(raw);
      if (!maybeIso) return raw;
      var dt = new Date(raw);
      if (isNaN(dt.getTime())) return raw;
      return dt.toLocaleString();
    }

    function statusTokenForUi_(value) {
      var token = String(value || "")
        .trim()
        .toLowerCase();
      if (!token) return "unknown";
      if (
        token === "active" ||
        token === "trial" ||
        token === "pending_activation" ||
        token === "expired" ||
        token === "revoked" ||
        token === "unknown"
      ) {
        return token;
      }
      if (
        token === "ok" ||
        token === "success" ||
        token === "enabled" ||
        token === "succeeded"
      ) {
        return "ok";
      }
      if (token === "warning" || token === "warn" || token === "pending") {
        return "warn";
      }
      if (
        token === "error" ||
        token === "err" ||
        token === "failed" ||
        token === "ko" ||
        token === "disabled"
      ) {
        return "err";
      }
      return "";
    }

    function inferLineToneClass_(line) {
      var l = String(line || "").toLowerCase();
      if (
        /(error|failed|invalid|revoked|expired|ko|missing|unavailable|cannot|could not)/.test(
          l,
        )
      ) {
        return "dt-output-line--err";
      }
      if (/(warn|warning|pending|trial|skipped|partial)/.test(l)) {
        return "dt-output-line--warn";
      }
      if (/(success|ok|saved|active|enabled|done|ready)/.test(l)) {
        return "dt-output-line--ok";
      }
      return "";
    }

    function looksLikeStatusLabel_(label) {
      var l = String(label || "").toLowerCase();
      return (
        l.indexOf("status") !== -1 ||
        l.indexOf("statut") !== -1 ||
        l.indexOf("الحالة") !== -1
      );
    }

    function renderStructuredOutput(outputEl, summaryLines, detailsObj) {
      if (!outputEl) return;
      outputEl.textContent = "";
      var lines = normalizeSummaryLines_(summaryLines);
      var kvGrid = document.createElement("div");
      kvGrid.className = "dt-output-kv-grid";
      var linesList = document.createElement("div");
      linesList.className = "dt-output-lines";
      var hasKv = false;
      var hasLines = false;

      lines.forEach(function (line) {
        var pair = tryParseSummaryPair_(line);
        if (pair) {
          var row = document.createElement("div");
          row.className = "dt-output-kv";
          var k = document.createElement("div");
          k.className = "dt-output-k";
          k.textContent = pair.key;
          var v = document.createElement("div");
          var statusToken = statusTokenForUi_(pair.value);
          var statusLike = looksLikeStatusLabel_(pair.key) || statusToken !== "";
          if (statusLike) {
            var pillToken = statusToken || "unknown";
            v.className = "dt-output-v dt-pill dt-pill--" + pillToken;
            v.textContent = pair.value;
          } else {
            var formatted = formatMaybeDateForUi_(pair.value);
            v.className = "dt-output-v";
            v.textContent = formatted;
            if (formatted !== pair.value) {
              v.title = pair.value;
            }
          }
          row.appendChild(k);
          row.appendChild(v);
          kvGrid.appendChild(row);
          hasKv = true;
          return;
        }

        var item = document.createElement("div");
        var toneClass = inferLineToneClass_(line);
        item.className = toneClass
          ? "dt-output-line " + toneClass
          : "dt-output-line";
        item.textContent = line;
        linesList.appendChild(item);
        hasLines = true;
      });

      if (!hasKv && !hasLines) {
        var empty = document.createElement("div");
        empty.className = "dt-output-line";
        empty.textContent = "—";
        outputEl.appendChild(empty);
      } else {
        if (hasKv) outputEl.appendChild(kvGrid);
        if (hasLines) outputEl.appendChild(linesList);
      }

      var detailsId = detailsNodeIdForPre_(outputEl);
      if (!detailsId) return;
      var detailsNode = $(detailsId);
      if (!detailsObj || !state.showTechnicalDetails) {
        if (detailsNode && detailsNode.parentNode) {
          detailsNode.parentNode.removeChild(detailsNode);
        }
        return;
      }
      if (!detailsNode) {
        detailsNode = document.createElement("details");
        detailsNode.className = "dt-json-details";
        detailsNode.id = detailsId;
        var summary = document.createElement("summary");
        summary.textContent = t("sidebar.msg.technical_details");
        detailsNode.appendChild(summary);
        var jsonPre = document.createElement("pre");
        jsonPre.className = "dt-pre dt-ltr";
        jsonPre.id = detailsId + "-json";
        detailsNode.appendChild(jsonPre);
        if (outputEl.parentNode) {
          safeInsertBefore_(
            outputEl.parentNode,
            detailsNode,
            outputEl.nextSibling,
          );
        }
      }
      var jsonNode = $(detailsId + "-json");
      if (jsonNode) {
        jsonNode.textContent = JSON.stringify(detailsObj, null, 2);
      }
      detailsNode.open = false;
    }

    function setStatus(msg, kind) {
      var s = el.status;
      if (!s) return;
      s.textContent = msg || "";
      s.className = substatusClass(kind);
    }

    function setBusy(busy) {
      // Keep global busy for core context switches, but avoid blocking unrelated sections.
      if (el.sheet) el.sheet.disabled = !!busy;
      if (el.langSelect) el.langSelect.disabled = !!busy;
      if (el.langApply) el.langApply.disabled = !!busy;
    }

    function setOrdersBusy(busy) {
      if (el.ordersPreview) el.ordersPreview.disabled = !!busy;
      if (el.ordersSend) el.ordersSend.disabled = !!busy;
      if (el.ordersSync) el.ordersSync.disabled = !!busy;
      if (el.ordersPrintLabels) el.ordersPrintLabels.disabled = !!busy;
      if (el.ordersPrintAll) el.ordersPrintAll.disabled = !!busy;
      if (el.sendCarrierMode) el.sendCarrierMode.disabled = !!busy;
      if (el.sendCarrierOverride) el.sendCarrierOverride.disabled = !!busy;
      if (el.autoSyncToggle) el.autoSyncToggle.disabled = !!busy;
    }

    function setLicenseBusy(busy) {
      if (el.apiUrlSave) el.apiUrlSave.disabled = !!busy;
      if (el.apiUrl) el.apiUrl.disabled = !!busy;
      if (el.apiKeySave) el.apiKeySave.disabled = !!busy;
      if (el.apiKey) el.apiKey.disabled = !!busy;
      if (el.licenseCode) el.licenseCode.disabled = !!busy;
      if (el.licenseRefresh) el.licenseRefresh.disabled = !!busy;
      if (el.licenseRefreshPublic) el.licenseRefreshPublic.disabled = !!busy;
      if (el.licenseClear) el.licenseClear.disabled = !!busy;
    }

    function setSetupBusy(busy) {
      if (el.save) el.save.disabled = !!busy;
      if (el.reload) el.reload.disabled = !!busy;
      if (el.headerRow) el.headerRow.disabled = !!busy;
      if (el.carrier) el.carrier.disabled = !!busy;
    }

    function substatusClass(kind) {
      if (kind === "err") return "dt-substatus dt-err";
      if (kind === "ok") return "dt-substatus dt-ok";
      return "dt-substatus";
    }

    function setOrdersStatus(msg, kind) {
      var s = el.ordersStatus;
      if (!s) return;
      s.textContent = msg || "";
      s.className = substatusClass(kind);
    }

    function setAutoSyncStatus(msg, kind) {
      var s = el.autoSyncStatus;
      if (!s) return;
      s.textContent = msg || "";
      if (kind === "ok" || kind === "err") {
        s.className = substatusClass(kind);
      } else {
        s.className = "dt-hint";
      }
    }

    function setFeeStatus(msg, kind) {
      var s = el.feeStatus;

    function statsBucketOrder_() {
      return [
        "delivered",
        "in_transit",
        "returned",
        "failed",
        "confirmed",
        "pending",
        "cancelled",
        "unknown",
      ];
    }

    function statsBucketMeta_(key) {
      var colors = {
        delivered: "#137333",
        in_transit: "#1a73e8",
        returned: "#ea8600",
        failed: "#c5221f",
        confirmed: "#188038",
        pending: "#5f6368",
        cancelled: "#9aa0a6",
        unknown: "#80868b",
      };
      return {
        key: key,
        label: t("stats.bucket." + key),
        color: colors[key] || "#5f6368",
      };
    }

    function statsSafeNumber_(raw) {
      var n = Number(raw);
      return isFinite(n) ? n : 0;
    }

    function statsFormatNumber_(raw) {
      return statsSafeNumber_(raw).toLocaleString();
    }

    function statsPercentValue_(part, total) {
      var p = statsSafeNumber_(part);
      var t0 = statsSafeNumber_(total);
      if (t0 <= 0) return 0;
      return Math.max(0, Math.min(100, Math.round((p / t0) * 1000) / 10));
    }

    function statsFormatPercent_(part, total) {
      return statsPercentValue_(part, total).toLocaleString() + "%";
    }

    function statsBuildDonutGradient_(items, total) {
      if (!total) {
        return "conic-gradient(#dadce0 0deg 360deg)";
      }
      var start = 0;
      var parts = [];
      items.forEach(function (it) {
        var slice = (360 * it.value) / total;
        if (slice <= 0) return;
        var end = start + slice;
        parts.push(it.color + " " + start.toFixed(2) + "deg " + end.toFixed(2) + "deg");
        start = end;
      });
      if (!parts.length) {
        return "conic-gradient(#dadce0 0deg 360deg)";
      }
      if (start < 360) {
        parts.push("#dadce0 " + start.toFixed(2) + "deg 360deg");
      }
      return "conic-gradient(" + parts.join(", ") + ")";
    }

      var fromV = el.statsFrom && el.statsFrom.value ? el.statsFrom.value : "";
      var toV = el.statsTo && el.statsTo.value ? el.statsTo.value : "";
      runServer("stats_computeSheet", fromV, toV, state.currentSheetId)
        .then(function (res) {
          var n = res.totalRowsAnalyzed != null ? res.totalRowsAnalyzed : 0;
          var buckets = res && res.buckets ? res.buckets : {};
          var dateFilter = res && res.dateFilter ? res.dateFilter : {};
          var infoLines = [];
          if (dateFilter.requested && !dateFilter.active) {
            infoLines.push(t("sidebar.msg.stats_order_date_unusable"));
            if (dateFilter.orderDateColumnMappedLabel) {
              infoLines.push(
                tf(
                  "sidebar.msg.stats_order_date_current_mapping",
                  dateFilter.orderDateColumnMappedLabel,
                ),
              );
            }
          } else if (
            dateFilter.active &&
            dateFilter.orderDateColumnSource &&
            dateFilter.orderDateColumnSource !== "mapped"
          ) {
            if (
              dateFilter.orderDateColumnMappedLabel &&
              dateFilter.orderDateColumnMappedLabel !==
                dateFilter.orderDateColumnEffectiveLabel
            ) {
              infoLines.push(
                tf(
                  "sidebar.msg.stats_order_date_current_mapping",
                  dateFilter.orderDateColumnMappedLabel,
                ),
              );
            }
            if (dateFilter.orderDateColumnEffectiveLabel) {
              infoLines.push(
                tf(
                  "sidebar.msg.stats_order_date_auto_detected",
                  dateFilter.orderDateColumnEffectiveLabel,
                ),
              );
            }
          }
          var lines = infoLines.concat([
            tf("sidebar.msg.rows_analyzed", n, res.sheetName || ""),
            tf(
              "sidebar.msg.stats_bucket_line",
              buckets.delivered || 0,
              buckets.in_transit || 0,
              buckets.returned || 0,
              buckets.failed || 0,
            ),
          ]);
          if (dateFilter.active) {
            lines.push(t("sidebar.msg.stats_filtered"));
            if (dateFilter.detectedMinIso && dateFilter.detectedMaxIso) {
              lines.push(
                tf(
                  "sidebar.msg.stats_detected_date_range",
                  dateFilter.detectedMinIso,
                  dateFilter.detectedMaxIso,
                ),
              );
            }
            lines.push(
              tf(
                "sidebar.msg.stats_filter_excluded",
                res.rowsFilteredBeforeDateRange || 0,
                res.rowsFilteredAfterDateRange || 0,
                res.rowsSkippedNoDateFilter || 0,
              ),
            );
            if ((res.totalRowsAnalyzed || 0) === 0) {
              lines.push(t("sidebar.msg.stats_zero_after_filter"));
            }
          }
          state.lastStatsResult = res;
          setStatsDashboardEnabled_(true);
          renderStructuredOutput(el.statsOut, lines, res);
          openStatsDashboard_();
          if (dateFilter.requested && !dateFilter.active) {
            setStatsStatus(t("sidebar.msg.stats_order_date_unusable"), "err");
          } else if (
            dateFilter.active &&
            dateFilter.orderDateColumnSource &&
            dateFilter.orderDateColumnSource !== "mapped" &&

              tf("sidebar.msg.rows_analyzed", n, res.sheetName || ""),
              null,

        .catch(function (err) {
          setStatsStatus(err.message || String(err), "err");

          setSectionBusy("dt-stats", false);

    function normalizeApiBaseUrlInput_(raw) {
      var url = String(raw || "").trim();
      if (!url) return "";
      // Copy/paste from chats or screenshots can inject spaces/newlines.
      url = url.replace(/\s+/g, "");
      // Heal accidental duplicated pastes such as
      // https://foo.ngrok-free.apphttps://foo.ngrok-free.app
      while (true) {
        var iHttp = url.indexOf("http://", 7);
        var iHttps = url.indexOf("https://", 8);
        var secondIdx = -1;
        if (iHttp >= 0 && iHttps >= 0) {
          secondIdx = Math.min(iHttp, iHttps);
        } else {
          secondIdx = Math.max(iHttp, iHttps);
        }
        if (secondIdx <= 0) break;
        var first = url.slice(0, secondIdx);
        var tail = url.slice(secondIdx);
        if (first === tail) {
          url = first;
          continue;
        }
        break;
      }
      // Common ngrok typo: missing ".app" on free domains.
      if (/^https?:\/\/[^/]*ngrok-free$/i.test(url)) {
        url += ".app";
      }
      return url;
    }

      if (token === "trial") return t("trial.badge_label");

      var box = el.licenseSummary;
      if (!box) return;
      while (box.firstChild) box.removeChild(box.firstChild);

      var title = document.createElement("p");
      title.className = "dt-license-summary-title";
      title.textContent = record
        ? t("sidebar.license.summary_license")
        : t("sidebar.license.summary_state");
      box.appendChild(title);

      if (!record) {
        var empty = document.createElement("p");
        empty.className = "dt-license-summary-empty";
        empty.textContent = t("sidebar.license.no_cache");
        box.appendChild(empty);
        return;
      }

      var grid = document.createElement("div");
      grid.className = "dt-license-grid";
      box.appendChild(grid);

      var addMetric = function (label, value, options) {
        if (value == null) return;
        var raw = String(value).trim();
        if (!raw) return;

        var item = document.createElement("div");
        item.className = "dt-license-item";

        var k = document.createElement("div");
        k.className = "dt-k";
        k.textContent = label;

        var v = document.createElement("div");
        if (options && options.status) {
          var token = statusTokenForUi_(raw) || "unknown";
          v.className = "dt-v dt-pill dt-pill--" + token;
          v.textContent = humanizeLicenseStatus_(raw);
        } else {
          var display = options && options.date ? formatMaybeDateForUi_(raw) : raw;
          v.className = "dt-v";
          v.textContent = display;
          if (display !== raw) {
            v.title = raw;
          }
        }

        item.appendChild(k);
        item.appendChild(v);
        grid.appendChild(item);
      };

      addMetric(
        t("sidebar.license.lbl_status"),
        record.licenseStatus || t("sidebar.msg.sync_meta_na"),
        { status: true },
      );
      addMetric(t("sidebar.license.lbl_plan"), record.planName);
      addMetric(t("sidebar.license.lbl_trial_end"), record.trialEnd, {
        date: true,
      });
      addMetric(t("sidebar.license.lbl_sub_end"), record.subscriptionEnd, {
        date: true,
      });
      if (record.licenseKey) {
        addMetric(
          t("sidebar.license.lbl_key"),
          String(record.licenseKey).slice(0, 8) + "…",
        );
      }
    }

    function formatJournalText_(data) {
      var entries = (data && data.entries) || [];
      if (!entries.length) {
        return t("sidebar.msg.journal_empty");
      }
      var lines = [];
      entries.forEach(function (e, idx) {
        lines.push(
          tf(
            "sidebar.msg.journal_line1",
            e.ts || "",
            e.kind || "",
            e.sheetName || "",
          ),
        );
        lines.push(
          tf(
            "sidebar.msg.journal_line2",
            e.attempted || 0,
            e.succeeded || 0,
            e.failed || 0,
          ),
        );
        if (e.failedRows && e.failedRows.length) {
          var fr = e.failedRows.slice(0, 36);
          lines.push(
            t("sidebar.msg.journal_failed_rows") +
              fr.join(", ") +
              (e.failedRows.length > fr.length ? " …" : ""),
          );
        }
        if (e.detailPreview && e.detailPreview.length) {
          lines.push(t("sidebar.msg.journal_detail"));
          e.detailPreview.forEach(function (p) {
            lines.push(
              tf(
                "sidebar.msg.journal_row",
                p.rowNumber != null ? p.rowNumber : "?",
                p.ok ? t("sidebar.msg.ok_short") : t("sidebar.msg.ko_short"),
                p.errorMessage || "",
              ),
            );
          });
        }
        if (idx < entries.length - 1) {
          lines.push("");
        }
      });
      return lines.join("\n");
    }

          var p;
          if (code) {

            p = runServer("license_activate", code).then(function () {
              return loadLicenseSidebar(true);

            p = loadLicenseSidebar(true);

          return p.then(function (st) {
            var statusLabel =
              st && st.status
                ? String(st.status)
                : String(state.licenseStatus || "");

            var msg = "";
            if (!ok && st && st.message) {
              msg = String(st.message);

              msg = t("sidebar.msg.license_current");
              if (statusLabel) {
                msg += " (" + statusLabel + ")";

            setLicenseStatus(msg, ok ? "ok" : "err");
            if (ok && (!state.sheets || !state.sheets.length)) {
              window.setTimeout(function () {
                try {
                  window.location.reload();

              }, 300);

            if (!ok) {

    function runServer(fnName) {
      var args = Array.prototype.slice.call(arguments, 1);
      if (!sidebarBridgeReady_()) {
        return Promise.reject(
          new Error(
            "Google sidebar bridge unavailable. Reload the sheet and reopen Delivery Tool.",
          ),
        );
      }
      return new Promise(function (resolve, reject) {
        var runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(function (err) {
            reject(err && err.message ? err : new Error(String(err)));
          });
        runner[fnName].apply(runner, args);
      });
    }

    function runServerAfterEditorFocus_(fnName) {
      var args = Array.prototype.slice.call(arguments, 1);
      try {
        if (
          window.google &&
          google.script &&
          google.script.host &&
          google.script.host.editor &&
          google.script.host.editor.focus
        ) {
          google.script.host.editor.focus();
        }
      } catch (e) {}
      return new Promise(function (resolve, reject) {
        setTimeout(function () {
          runServer.apply(null, [fnName].concat(args)).then(resolve, reject);
        }, 50);
      });
    }

    function mergeSuggestedMapping_(saved, suggested) {
      var base = saved && typeof saved === "object" ? saved : {};
      var out = {
        spreadsheetId: base.spreadsheetId || state.spreadsheetId,
        sheetId: base.sheetId != null ? base.sheetId : state.currentSheetId,
        sheetName:
          base.sheetName ||
          (suggested && suggested.sheetName ? suggested.sheetName : ""),
        columns:
          base.columns && typeof base.columns === "object"
            ? Object.assign({}, base.columns)
            : {},
        defaultCarrier:
          base.defaultCarrier != null &&
          String(base.defaultCarrier).trim() !== ""
            ? String(base.defaultCarrier)
            : null,
        headerRow:
          base.headerRow != null
            ? base.headerRow
            : suggested && suggested.headerRow != null
              ? suggested.headerRow
              : 1,
        schemaVersion:
          base.schemaVersion != null
            ? base.schemaVersion
            : suggested && suggested.schemaVersion != null
              ? suggested.schemaVersion
              : 2,
      };
      if (
        suggested &&
        suggested.columns &&
        typeof suggested.columns === "object"
      ) {
        var conf =
          suggested.confidenceByField &&
          typeof suggested.confidenceByField === "object"
            ? suggested.confidenceByField
            : {};
        var SMART_OVERRIDE_MIN = 0.88;
        var smartOverrideFields = {
          addressColumn: true,
          deliveryTypeColumn: true,
          carrierColumn: true,
        };
        Object.keys(suggested.columns).forEach(function (k) {
          var sugRaw = suggested.columns[k];
          if (sugRaw === null) {
            delete out.columns[k];
            return;
          }
          var sugN =
            typeof sugRaw === "number"
              ? sugRaw
              : parseInt(String(sugRaw), 10);
          if (isNaN(sugN) || sugN < 1) {
            return;
          }
          var curRaw = out.columns[k];
          var curN =
            curRaw != null && curRaw !== ""
              ? typeof curRaw === "number"
                ? curRaw
                : parseInt(String(curRaw), 10)
              : NaN;
          var empty = isNaN(curN) || curN < 1;
          if (empty) {
            out.columns[k] = sugN;
            return;
          }
          if (sugN === curN) {
            return;
          }
          var score = conf[k];
          if (
            smartOverrideFields[k] &&
            typeof score === "number" &&
            score >= SMART_OVERRIDE_MIN
          ) {
            out.columns[k] = sugN;
          }
        });
      }
      if (
        (out.defaultCarrier == null || String(out.defaultCarrier).trim() === "") &&
        suggested &&
        suggested.defaultCarrier != null &&
        String(suggested.defaultCarrier).trim() !== ""
      ) {
        out.defaultCarrier = String(suggested.defaultCarrier);
      }
      return out;
    }

      if (input && input.value) {
        var parsed = parseInt(input.value, 10);
        if (!isNaN(parsed) && parsed >= 1) {
          return parsed;
        }
      }
      if (state.mapping && state.mapping.headerRow != null) {
        var saved = parseInt(String(state.mapping.headerRow), 10);
        if (!isNaN(saved) && saved >= 1) {
          return saved;
        }
      }
      return 1;
    }

    function loadHeadersAndMapping() {
      var sheetId = state.currentSheetId;
      if (sheetId == null) return Promise.resolve();

      setBusy(true);
      setSectionBusy("dt-setup", true);
      setStatus(t("sidebar.msg.loading"), null);
      var headerRow = getSelectedHeaderRowOrDefault_();

      return runServer("setup_getHeaders", sheetId, headerRow)
        .then(function (headers) {
          state.headerPayload = headers;
          buildFieldSelects();
          return runServer("setup_loadMapping", sheetId);
        })
        .then(function (mapping) {
          state.mapping = mapping;
          function finalizeMappingLoad_() {
            state.mappingReady = mappingHasRequiredColumns_(state.mapping);
            populateSendCarrierOverrideSelect_();
            refreshFlowReadiness_();
            setStatus(
              state.carriersWarning || t("sidebar.msg.ready"),
              state.carriersWarning ? "err" : "ok",
            );
            runServer(
              "mobile_refreshCompanionArtifactsForSheetId",
              sheetId,
            ).catch(function () {
              return null;
            });
            return null;
          }
          var currentCarrierId =
            mapping && mapping.defaultCarrier != null
              ? String(mapping.defaultCarrier || "").trim()
              : el.carrier
                ? String(el.carrier.value || "").trim()
                : "";
          return runServer(
            "setup_getCarrierAwareSuggestedMapping",
            sheetId,
            headerRow,
            currentCarrierId || null,
            (mapping && mapping.columns) || {},
          )
            .then(function (suggested) {
              state.mapping = mergeSuggestedMapping_(state.mapping, suggested);
              applyMappingToFields();
              return finalizeMappingLoad_();
            })
            .catch(function () {
              applyMappingToFields();
              return finalizeMappingLoad_();
            });
        })
        .catch(function (err) {
          state.mappingReady = false;
          refreshFlowReadiness_();
          setStatus(err.message || String(err), "err");
        })
        .then(function () {
          setSectionBusy("dt-setup", false);
          setBusy(false);
        });
    }

    function autoTuneMappingForCarrier_() {
      var sheetId = state.currentSheetId;
      if (sheetId == null) return Promise.resolve();
      if (
        !state.headerPayload ||
        !state.headerPayload.columns ||
        !state.headerPayload.columns.length
      ) {
        return Promise.resolve();
      }
      var carrierId = el.carrier ? String(el.carrier.value || "").trim() : "";
      var headerRow = getSelectedHeaderRowOrDefault_();
      var currentColumns = collectColumnsFromFields();
      return runServer(
        "setup_getCarrierAwareSuggestedMapping",
        sheetId,
        headerRow,
        carrierId || null,
        currentColumns,
      )
        .then(function (smart) {
          var baseMapping = state.mapping || {};
          state.mapping = mergeSuggestedMapping_(
            {
              spreadsheetId: state.spreadsheetId,
              sheetId: state.currentSheetId,
              sheetName: baseMapping.sheetName || "",
              columns: currentColumns,
              defaultCarrier: carrierId || null,
              headerRow: headerRow,
              schemaVersion: baseMapping.schemaVersion || 2,
            },
            smart || {},
          );
          applyMappingToFields();
          state.mappingReady = mappingHasRequiredColumns_(state.mapping);
          refreshFlowReadiness_();
        })
        .catch(function () {
          // Best-effort only; never block user edits when smart tune is unavailable.
          return null;
        });

    function previewOrders() {
      if (state.ordersPipelineBusy) {
        setOrdersStatus(t("sidebar.msg.orders_busy"), "err");
        return;
      }
      state.ordersPipelineBusy = true;
      var rowSelectionSpec = getRowSelectionSpec_();
      clearStructuredOutput(el.ordersOut);
      setOrdersStatus(t("sidebar.msg.analyzing"), null);
      setOrdersBusy(true);
      setSectionBusy("dt-orders", true);
      runServerAfterEditorFocus_("order_previewSelection", rowSelectionSpec, getSendOptions_())
        .then(function (result) {
          var n = result.rows ? result.rows.length : 0;
          var ok = 0;
          var warnRows = 0;
          var invalidRows = 0;
          var headerCount = 0;
          var emptyCount = 0;
          if (result.rows) {
            result.rows.forEach(function (r) {
              if (r.skipped && r.skipReason === "header") headerCount++;
              if (r.skipped && r.skipReason === "empty") emptyCount++;
              if (!r.skipped && r.valid) ok++;
              if (!r.skipped && r.warnings && r.warnings.length) warnRows++;
              if (!r.skipped && !r.valid) invalidRows++;
            });
          }
          var userHint = "";
          if (ok === 0 && n > 0) {
            if (headerCount === n) {
              userHint = t("sidebar.msg.preview_only_header");
            } else if (emptyCount === n) {
              userHint = t("sidebar.msg.preview_only_empty");
            }
          }
          var summaryLines = [];
          if (userHint) summaryLines.push(userHint);
          summaryLines.push(tf("sidebar.msg.preview_summary", n, ok));
          if (invalidRows > 0) {
            summaryLines.push(
              tf("sidebar.msg.preview_invalid_rows", invalidRows),
            );
          }
          if (warnRows > 0) {
            summaryLines.push(tf("sidebar.msg.preview_warning_rows", warnRows));
          }
          renderStructuredOutput(el.ordersOut, summaryLines, result);
          var scan =
            result.duplicateIndexLastRow != null
              ? tf(
                  "sidebar.msg.preview_footer_dup",
                  result.duplicateIndexLastRow,
                )
              : "";
          var warnTail =
            warnRows > 0 ? tf("sidebar.msg.preview_footer_warn", warnRows) : "";
          setOrdersStatus(
            (userHint ? userHint + " " : "") +
              tf("sidebar.msg.preview_summary", n, ok) +
              scan +
              warnTail,
            null,
          );
        })
        .catch(function (err) {
          setOrdersStatus(err.message || String(err), "err");
        })
        .then(function () {
          state.ordersPipelineBusy = false;
          setSectionBusy("dt-orders", false);
          setOrdersBusy(false);
        });
    }

    function sendSelection() {
      if (state.ordersPipelineBusy) {
        setOrdersStatus(t("sidebar.msg.orders_busy"), "err");
        return;
      }
      state.ordersPipelineBusy = true;
      var rowSelectionSpec = getRowSelectionSpec_();
      setOrdersBusy(true);
      setSectionBusy("dt-orders", true);
      setOrdersStatus(t("sidebar.msg.sending"), null);
      clearStructuredOutput(el.ordersOut);
      runServerAfterEditorFocus_("send_sendSelection", rowSelectionSpec, getSendOptions_())
        .then(function (result) {
          // Cache label URLs for printing buttons.
          state.lastLabelUrls =
            result && Array.isArray(result.labelUrls) ? result.labelUrls : [];
          var a = result.attempted || 0;
          var s = result.succeeded || 0;
          var f = result.failed || 0;
          var lines = [tf("sidebar.msg.send_summary", a, s, f)];
          if (result && result.done === false && result.message) {
            lines.push(String(result.message));
          }
          if (state.lastLabelUrls.length > 0) {
            lines.push(
              tf("sidebar.msg.labels_cached", state.lastLabelUrls.length),
            );
          }
          renderStructuredOutput(el.ordersOut, lines, result);
          setOrdersStatus(
            tf("sidebar.msg.send_summary", a, s, f),
            f > 0 ? "err" : "ok",
          );
          return loadJournal();
        })
        .catch(function (err) {
          setOrdersStatus(err.message || String(err), "err");
        })
        .then(function () {
          state.ordersPipelineBusy = false;
          setSectionBusy("dt-orders", false);
          setOrdersBusy(false);
        });
    }

    function syncSelection() {
      if (state.ordersPipelineBusy) {
        setOrdersStatus(t("sidebar.msg.orders_busy"), "err");
        return;
      }
      state.ordersPipelineBusy = true;
      var rowSelectionSpec = getRowSelectionSpec_();
      setOrdersBusy(true);
      setSectionBusy("dt-orders", true);
      setOrdersStatus(t("sidebar.msg.syncing"), null);
      clearStructuredOutput(el.ordersOut);
      runServerAfterEditorFocus_("sync_syncSelection", rowSelectionSpec, {
        sheetId: state.currentSheetId,
      })
        .then(function (result) {
          var a = result.attempted || 0;
          var s = result.succeeded || 0;
          var f = result.failed || 0;
          var lines = [tf("sidebar.msg.sync_summary", a, s, f)];
          var iso =
            result.lastSyncSuccessIso != null
              ? result.lastSyncSuccessIso
              : result.lastSyncIso || "";
          if (iso) {
            lines.push(tf("sidebar.msg.sync_last_ok", iso));
          }
          renderStructuredOutput(el.ordersOut, lines, result);
          var tail = iso ? tf("sidebar.msg.sync_last_ok", iso) : "";
          setOrdersStatus(
            tf("sidebar.msg.sync_summary", a, s, f) + tail,
            f > 0 ? "err" : "ok",
          );
          return loadSyncMeta().then(function () {
            return loadJournal();
          });
        })
        .catch(function (err) {
          setOrdersStatus(err.message || String(err), "err");

    function openLabelUrls_(urls) {
      if (!urls || !urls.length) {
        setOrdersStatus(t("sidebar.msg.no_labels"), "err");
        return;
      }
      urls.forEach(function (u) {
        if (u && u.url) {
          try {
            window.open(String(u.url), "_blank");
          } catch (e) {
            // Best effort only; errors surfaced via status.
          }
        }
      });
      setOrdersStatus(tf("sidebar.msg.labels_opened", urls.length), "ok");
    }

    function openAllMappedLabelUrls() {
      setOrdersBusy(true);
      setSectionBusy("dt-orders", true);
      setOrdersStatus(t("sidebar.msg.loading_labels"), null);
      runServer(
        "send_getAllLabelUrls",
        state.currentSheetId != null ? state.currentSheetId : null,
      )
        .then(function (res) {
          var items = res && Array.isArray(res.items) ? res.items : [];
          renderStructuredOutput(
            el.ordersOut,
            [tf("sidebar.msg.labels_found", items.length)],
            res || { items: [] },
          );
          if (!items.length) {
            setOrdersStatus(t("sidebar.msg.no_labels"), "err");
            return;
          }
          if (items.length > 20) {
            var confirmMsg = tf(
              "sidebar.msg.labels_confirm_many",
              items.length,
            );
            if (!window.confirm(confirmMsg)) {
              setOrdersStatus(t("sidebar.msg.labels_cancelled"), null);
              return;
            }
          }
          var batchSize = 10;
          for (var i = 0; i < items.length; i += batchSize) {
            openLabelUrls_(items.slice(i, i + batchSize));
          }
        })
        .catch(function (err) {
          setOrdersStatus(err.message || String(err), "err");
        })
        .then(function () {
          setSectionBusy("dt-orders", false);
          setOrdersBusy(false);
        });
    }

        if (el.journalRetrySync) {
          el.journalRetrySync.addEventListener("click", selectFailedSyncRows);
        }
        if (el.carrierCredSave) {
          el.carrierCredSave.addEventListener("click", saveCarrierCred);
        }
        if (el.carrierCredTest) {
          el.carrierCredTest.addEventListener("click", testCarrierCred);
        }
        if (el.carrierCredCarrier) {
          el.carrierCredCarrier.addEventListener("change", function () {
            renderCarrierCredInputs_();
            setCarrierCredStatus("", null);
          });
        }
        if (el.bizSave) {
          el.bizSave.addEventListener("click", saveBusinessSettings);
        }
        if (el.bizReload) {
          el.bizReload.addEventListener("click", function () {
            setBusy(true);
            setSectionBusy("dt-business", true);
            loadBusinessSettings()
              .then(function () {
                setSectionBusy("dt-business", false);
                setBusy(false);
              })
              .catch(function () {
                setSectionBusy("dt-business", false);
                setBusy(false);
              });
          });
        }
        if (el.langSelect) {
          el.langSelect.value =
            typeof window.__DT_LANG__ === "string" ? window.__DT_LANG__ : "ar";
          el.langSelect.addEventListener("change", function () {
            setLicenseStatus("", null);
          });
        }
        if (el.langApply) {
          el.langApply.addEventListener("click", applySelectedLanguage_);
        }
      } catch (e) {
        notifyLicenseError_(e);
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  })();
</script>
