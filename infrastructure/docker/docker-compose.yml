services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-delivery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delivery}
      POSTGRES_DB: ${POSTGRES_DB:-delivery_tool}
    volumes:
      - delivery_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file:
      # Root .env carries secrets like API_KEY, ADMIN_SECRET, JWT_SECRET, LICENSE_PEPPER, etc.
      # We deliberately avoid re-declaring them here to prevent compose from overriding values.
      - ../../.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-delivery}:${POSTGRES_PASSWORD:-delivery}@postgres:5432/${POSTGRES_DB:-delivery_tool}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  admin-dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w @delivery-tool/admin-dashboard -- --host 0.0.0.0 --port 5173"
    env_file:
      - ../../.env
    volumes:
      - ../../:/app
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  delivery_pgdata:
