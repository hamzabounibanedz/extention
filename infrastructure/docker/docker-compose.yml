services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-delivery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delivery}
      POSTGRES_DB: ${POSTGRES_DB:-delivery_tool}
    volumes:
      - delivery_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      # Root .env carries secrets like API_KEY, ADMIN_SECRET, JWT_SECRET, LICENSE_PEPPER, etc.
      # We deliberately avoid re-declaring them here to prevent compose from overriding values.
      - ../../.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-delivery}:${POSTGRES_PASSWORD:-delivery}@postgres:5432/${POSTGRES_DB:-delivery_tool}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"

  admin-dashboard:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run dev -w @delivery-tool/admin-dashboard -- --host 0.0.0.0 --port 5173"
    environment:
      # Vite proxy target: hostname `backend` only exists on the Docker network
      ADMIN_DASHBOARD_PROXY_TARGET: http://backend:3000
      # File change events can be unreliable on mounted Windows volumes
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../../:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    ports:
      - "${ADMIN_DASHBOARD_HOST_PORT:-5173}:5173"

volumes:
  delivery_pgdata:
  admin_node_modules:
